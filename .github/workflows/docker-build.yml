name: Build and Test Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cart-abandonment-api .

      - name: Run container and test health endpoint
        run: |
          docker run -d -p 8000:8000 --name test-container cart-abandonment-api
          sleep 5
          curl --fail http://localhost:8000/ || exit 1
          docker stop test-container
